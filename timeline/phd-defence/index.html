<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhD Defense Timeline</title>
<style>
  :root{
    --bg:#0b0e17;
    --bg2:#121627;
    --accent:#7c5cff;
    --accent2:#00d4ff;
    --done:#2ecc71;
    --progress:#f5a623;
    --critical:#ff4d5e;
    --milestone:#ffd54a;
    --upcoming:#4a5578;
    --text:#e8eaf6;
    --muted:#9aa3c7;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI', Roboto, -apple-system, sans-serif;
    background:radial-gradient(circle at 20% 0%, #1a1f38 0%, var(--bg) 60%);
    color:var(--text);
    overflow-x:hidden;
  }
  header{
    text-align:center;
    padding:80px 20px 40px;
    position:relative;
  }
  header h1{
    font-size:2.8rem;
    margin:0;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    animation:glow 3s ease-in-out infinite alternate;
  }
  header p{
    color:var(--muted);
    margin-top:10px;
    font-size:1.1rem;
  }
  @keyframes glow{
    from{filter:drop-shadow(0 0 5px rgba(124,92,255,.4));}
    to{filter:drop-shadow(0 0 25px rgba(0,212,255,.6));}
  }
  .progress-wrap{
    max-width:600px;
    margin:0 auto 20px;
    background:#1a1f38;
    border-radius:20px;
    height:14px;
    overflow:hidden;
    box-shadow:inset 0 0 6px rgba(0,0,0,.6);
  }
  .progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    transition:width 1.5s ease-out;
    border-radius:20px;
  }
  .progress-label{
    text-align:center;
    color:var(--muted);
    font-size:.9rem;
    margin-bottom:40px;
  }
  .legend{
    display:flex;
    justify-content:center;
    gap:22px;
    flex-wrap:wrap;
    margin-bottom:60px;
    font-size:.85rem;
    color:var(--muted);
  }
  .legend span{
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
  .timeline{
    position:relative;
    max-width:1000px;
    margin:0 auto;
    padding:20px 0 120px;
  }
  .timeline::before{
    content:'';
    position:absolute;
    left:50%;
    top:0;
    bottom:0;
    width:4px;
    background:linear-gradient(180deg, var(--accent), var(--accent2), var(--accent));
    transform:translateX(-50%);
    border-radius:4px;
    box-shadow:0 0 20px rgba(124,92,255,.5);
  }
  .item{
    position:relative;
    width:50%;
    padding:20px 40px;
    opacity:0;
    transform:translateY(40px);
    transition:opacity .6s ease, transform .6s ease;
  }
  .item.visible{
    opacity:1;
    transform:translateY(0);
  }
  .item:nth-child(odd){
    left:0;
    text-align:right;
  }
  .item:nth-child(even){
    left:50%;
    text-align:left;
  }
  .node{
    position:absolute;
    top:26px;
    width:22px;height:22px;
    border-radius:50%;
    border:3px solid var(--bg);
    box-shadow:0 0 0 4px rgba(255,255,255,.05), 0 0 16px currentColor;
    z-index:2;
  }
  .item:nth-child(odd) .node{right:-11px;}
  .item:nth-child(even) .node{left:-11px;}

  .status-done{color:var(--done); background:var(--done);}
  .status-in-progress{color:var(--progress); background:var(--progress);}
  .status-upcoming{color:var(--upcoming); background:var(--upcoming);}
  .status-critical{color:var(--critical); background:var(--critical); animation:pulse 1.4s infinite;}
  .status-milestone{color:var(--milestone); background:var(--milestone); animation:pulse 1.4s infinite;}

  @keyframes pulse{
    0%{box-shadow:0 0 0 4px rgba(255,255,255,.05), 0 0 16px currentColor;}
    50%{box-shadow:0 0 0 8px rgba(255,255,255,.08), 0 0 30px currentColor;}
    100%{box-shadow:0 0 0 4px rgba(255,255,255,.05), 0 0 16px currentColor;}
  }

  .card{
    display:inline-block;
    max-width:90%;
    background:linear-gradient(145deg, var(--bg2), #171c33);
    border:1px solid rgba(255,255,255,.06);
    border-radius:14px;
    padding:16px 20px;
    box-shadow:0 8px 20px rgba(0,0,0,.4);
    transition:transform .3s ease, box-shadow .3s ease;
  }
  .card:hover{
    transform:translateY(-4px) scale(1.02);
    box-shadow:0 12px 30px rgba(124,92,255,.3);
  }
  .card .no{
    font-size:.75rem;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:1px;
  }
  .card .date{
    font-size:.8rem;
    color:var(--accent2);
    font-weight:600;
    margin:2px 0 6px;
  }
  .card .task{
    font-size:1.02rem;
    font-weight:600;
    color:var(--text);
    margin-bottom:6px;
  }
  .card .resp{
    font-size:.85rem;
    color:var(--muted);
    margin-bottom:4px;
  }
  .card .resp b{color:var(--accent2);}
  .card .note{
    font-size:.8rem;
    color:#c9a2ff;
    font-style:italic;
  }
  .badge{
    display:inline-block;
    font-size:.7rem;
    padding:2px 10px;
    border-radius:20px;
    margin-top:6px;
    font-weight:700;
    letter-spacing:.5px;
  }
  .badge.status-done{background:rgba(46,204,113,.15); color:var(--done);}
  .badge.status-in-progress{background:rgba(245,166,35,.15); color:var(--progress);}
  .badge.status-upcoming{background:rgba(74,85,120,.25); color:var(--muted);}
  .badge.status-critical{background:rgba(255,77,94,.15); color:var(--critical);}
  .badge.status-milestone{background:rgba(255,213,74,.15); color:var(--milestone);}

  @media (max-width:768px){
    .timeline::before{left:20px;}
    .item{width:100%; left:0 !important; text-align:left !important; padding-left:50px; padding-right:10px;}
    .item .node{left:9px !important; right:auto !important;}
  }

  footer{
    text-align:center;
    color:var(--muted);
    padding:30px;
    font-size:.8rem;
  }
</style>
</head>
<body>

<header>
  <h1 id="page-title">PhD Defense Timeline</h1>
  <p id="page-subtitle">Loading...</p>
</header>

<div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
<div class="progress-label" id="progressLabel"></div>

<div class="legend">
  <span><i class="dot" style="background:var(--done)"></i> Done</span>
  <span><i class="dot" style="background:var(--progress)"></i> In progress</span>
  <span><i class="dot" style="background:var(--upcoming)"></i> Upcoming</span>
  <span><i class="dot" style="background:var(--critical)"></i> Critical</span>
  <span><i class="dot" style="background:var(--milestone)"></i> Milestone</span>
</div>

<div class="timeline" id="timeline"></div>

<footer>Edit <code>data.json</code> to update tasks, dates, status and notes — this page rebuilds itself automatically.</footer>

<script>
async function loadTimeline(){
  let data;
  try{
    const res = await fetch('data.json');
    data = await res.json();
  }catch(e){
    document.getElementById('page-subtitle').textContent = 'Could not load data.json (serve this folder via a local web server, not double-click the file).';
    return;
  }

  document.getElementById('page-title').textContent = data.title || 'Timeline';
  document.getElementById('page-subtitle').textContent = data.subtitle || '';

  const container = document.getElementById('timeline');
  const steps = data.steps || [];

  const doneCount = steps.filter(s=>s.status==='done').length;
  const pct = steps.length ? Math.round((doneCount/steps.length)*100) : 0;
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${doneCount} / ${steps.length} steps completed (${pct}%)`;

  steps.forEach(step=>{
    const item = document.createElement('div');
    item.className = 'item';

    const node = document.createElement('div');
    node.className = 'node status-' + step.status;
    item.appendChild(node);

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="no">Step ${step.no}</div>
      <div class="date">${formatDate(step.date)}</div>
      <div class="task">${step.task}</div>
      <div class="resp">Responsible: <b>${step.responsible}</b></div>
      ${step.note ? `<div class="note">${step.note}</div>` : ''}
      <div class="badge status-${step.status}">${labelFor(step.status)}</div>
    `;
    item.appendChild(card);
    container.appendChild(item);
  });

  const observer = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){ e.target.classList.add('visible'); }
    });
  }, {threshold:0.15});

  document.querySelectorAll('.item').forEach(el=>observer.observe(el));
}

function formatDate(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'});
}

function labelFor(status){
  const map = {
    'done':'Done',
    'in-progress':'In Progress',
    'upcoming':'Upcoming',
    'critical':'Critical',
    'milestone':'Milestone'
  };
  return map[status] || status;
}

loadTimeline();
</script>
</body>
</html>
